name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    name: Build, Lint & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build (esbuild)
        run: npm run esbuild

      - name: Lint
        run: npm run lint

      - name: TypeScript compile
        run: npm run ts-compile

      - name: Unit tests
        run: npm run unit-test
